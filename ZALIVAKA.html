<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Vape Shop • Синий стиль</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      background: #030711;
    }

    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0f4ff;
      -webkit-tap-highlight-color: transparent;
    }

    .bg-decoration {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.06;
      animation: float 20s infinite ease-in-out;
    }
    .bg-circle.c1 { width: 450px; height: 450px; background: #0088ff; top: -15%; left: -10%; }
    .bg-circle.c2 { width: 350px; height: 350px; background: #00aaff; bottom: -10%; right: -5%; animation-delay: -7s; }
    .bg-circle.c3 { width: 200px; height: 200px; background: #66ccff; top: 40%; left: 60%; opacity: 0.04; }
    .floating-icons { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .float-icon {
      position: absolute; font-size: 64px; color: #0088ff; opacity: 0.04;
      animation: drift 18s infinite linear;
    }
    .float-icon:nth-child(1) { top: 10%; left: 5%; animation-duration: 24s; font-size: 80px; }
    .float-icon:nth-child(2) { top: 25%; left: 85%; animation-duration: 20s; animation-delay: -5s; }
    .float-icon:nth-child(3) { top: 70%; left: 15%; animation-duration: 28s; animation-delay: -10s; }
    .float-icon:nth-child(4) { top: 55%; left: 75%; animation-duration: 22s; animation-delay: -3s; }
    .float-icon:nth-child(5) { top: 85%; left: 50%; animation-duration: 26s; animation-delay: -8s; }
    .float-icon:nth-child(6) { top: 40%; left: 40%; animation-duration: 20s; animation-delay: -12s; }

    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(30px, -25px) rotate(5deg); }
      50% { transform: translate(-15px, 35px) rotate(-3deg); }
      75% { transform: translate(-35px, -15px) rotate(2deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(45px, -35px) scale(1.1); }
      50% { transform: translate(-25px, 30px) scale(0.92); }
      75% { transform: translate(-40px, -20px) scale(1.04); }
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 10px 25px rgba(0,136,255,0.25); }
      50% { box-shadow: 0 15px 35px rgba(0,170,255,0.4); }
    }
    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    .app-container {
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      background: rgba(10, 15, 27, 0.75);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      padding-bottom: 75px;
    }
    .screen.hidden { display: none !important; }

    .welcome-screen {
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 24px;
      background: radial-gradient(circle at 30% 30%, rgba(0,136,255,0.05), transparent 70%);
    }
    .morning-icon { font-size: 72px; color: #00aaff; text-shadow: 0 0 30px rgba(0,170,255,0.5); animation: floatIcon 3s infinite ease-in-out; margin-bottom: 20px; }
    .welcome-title {
      font-family: 'Playfair Display', serif; font-size: clamp(28px, 7vw, 36px); font-weight: 600;
      background: linear-gradient(135deg, #ffffff, #99ccff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .welcome-subtitle { font-size: clamp(16px, 4vw, 18px); color: #a0b9d9; }

    .profile-screen { justify-content: center; align-items: center; padding: 44px 24px 24px; }
    .avatar-frame {
      width: 105px; height: 105px; border-radius: 50%; background: linear-gradient(135deg, #0088ff, #00aaff);
      padding: 3px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,136,255,0.3);
      animation: softPulse 3s infinite; position: relative;
    }
    .avatar-frame::after {
      content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
      border-radius: 50%; border: 1px dashed rgba(255,255,255,0.2);
      animation: rotate 12s linear infinite; pointer-events: none;
    }
    .avatar { width: 100%; height: 100%; border-radius: 50%; background: #111827; display: flex; align-items: center; justify-content: center; font-size: 46px; color: #00aaff; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .username {
      font-family: 'Playfair Display', serif; font-size: clamp(24px, 6vw, 28px); font-weight: 600;
      background: linear-gradient(to right, #e0f0ff, #a0c8f0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }
    .user-level {
      font-size: 13px; font-weight: 500; background: rgba(255,255,255,0.04); backdrop-filter: blur(12px);
      padding: 5px 20px; border-radius: 24px; color: #a0b9d9; border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 28px; display: flex; align-items: center; gap: 6px;
    }
    .stats-row { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; justify-content: center; }
    .stat-item {
      background: rgba(20, 30, 48, 0.5); backdrop-filter: blur(18px); border-radius: 24px;
      padding: 14px 22px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; min-width: 75px;
    }
    .stat-value { font-weight: 700; font-size: 20px; color: #00aaff; }
    .stat-label { font-size: 10px; color: #7b8ca8; text-transform: uppercase; margin-top: 4px; }
    .balance-badge {
      background: rgba(0,136,255,0.06); backdrop-filter: blur(25px); border-radius: 34px;
      padding: 14px 32px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(0,170,255,0.25); margin-top: 10px;
    }

    .flavor-screen { background: rgba(10, 15, 27, 0.95); backdrop-filter: blur(30px); padding: 20px 16px; }
    .flavor-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .flavor-header h2 { font-weight: 600; font-size: 20px; color: #e0f0ff; flex: 1; }
    .back-btn {
      background: rgba(255,255,255,0.06); border: none; color: #ccc; font-size: 20px;
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .back-btn:active { background: rgba(255,255,255,0.2); }
    .flavor-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .flavor-item {
      background: rgba(20, 26, 36, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; padding: 16px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer;
    }
    .flavor-item:active { background: rgba(0,136,255,0.2); }
    .flavor-icon { font-size: 24px; color: #00aaff; }
    .flavor-info { flex: 1; }
    .flavor-name { font-weight: 600; color: #e0f0ff; }
    .flavor-prefix { font-size: 13px; color: #7b8ca8; }

    .juice-screen { justify-content: center; align-items: center; padding: 30px 24px; background: radial-gradient(circle at 50% 30%, rgba(0,136,255,0.08), transparent 70%); }
    .juice-fill-container { margin: 18px 0 8px; display: flex; flex-direction: column; align-items: center; }
    .cartridge-body { width: 50px; height: 100px; background: rgba(18,23,33,0.8); border: 2px solid rgba(255,255,255,0.12); border-radius: 16px 16px 6px 6px; position: relative; overflow: hidden; box-shadow: inset 0 0 12px rgba(0,0,0,0.6); }
    .liquid-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: linear-gradient(180deg, #00aaff, #0066cc); transition: height 1s; border-radius: 0 0 4px 4px; }
    .cartridge-tip { width: 18px; height: 16px; background: #1f2a3a; border-radius: 5px 5px 9px 9px; margin-top: -2px; border: 2px solid rgba(255,255,255,0.1); }
    .refill-btn {
      background: linear-gradient(135deg, #0088ff, #0066cc); border: none; color: white; font-weight: 600;
      padding: 14px 36px; border-radius: 36px; font-size: 15px; margin-top: 14px; cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,136,255,0.35);
    }
    .refill-btn:active { transform: scale(0.95); }
    .refill-btn:disabled { opacity: 0.6; pointer-events: none; }

    /* Экран карты – без padding-bottom, нижняя панель абсолютна */
    .map-screen { flex-direction: column; background: #030711; padding-bottom: 0; }
    .map-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; background: rgba(10, 15, 27, 0.85); backdrop-filter: blur(20px);
      position: relative; z-index: 10; /* чтобы был над картой */
    }
    .map-title { font-weight: 600; font-size: 15px; color: #f0f4ff; }
    .map-close { background: rgba(255,255,255,0.06); border: none; color: #ccc; font-size: 18px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
    .map-close:active { background: rgba(255,255,255,0.2); }
    #map { flex: 1; width: 100%; background: #030711; }

    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: center; align-items: center;
      gap: clamp(16px, 5vw, 24px); padding: 10px 20px 16px;
      background: rgba(8, 12, 20, 0.7); backdrop-filter: blur(45px);
      border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: transparent; border: none; color: #7b8ca8; font-family: 'Inter', sans-serif;
      cursor: pointer; padding: 6px 10px; border-radius: 16px;
    }
    .nav-btn i { font-size: clamp(20px, 5vw, 22px); }
    .nav-btn span { font-size: clamp(9px, 2.5vw, 10px); font-weight: 600; text-transform: uppercase; }
    .nav-btn.active i, .nav-btn.active span { color: #00aaff; text-shadow: 0 0 10px rgba(0,170,255,0.6); }
    .center-btn {
      width: 72px; height: 72px; border-radius: 50%; background: rgba(20, 30, 48, 0.7); backdrop-filter: blur(20px);
      border: 2px solid rgba(0,170,255,0.3); box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: #b0c8e0; cursor: pointer;
    }
    .center-btn i { font-size: 28px; filter: drop-shadow(0 0 6px rgba(0,170,255,0.4)); }
    .center-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #b0c8e0; }
    .center-btn:active { transform: scale(0.95); border-color: rgba(0,170,255,0.7); }

    .onboarding-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(3, 7, 17, 0.8); backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px); display: flex; align-items: center; justify-content: center;
      z-index: 1000; transition: opacity 0.4s;
    }
    .onboarding-overlay.hidden { opacity: 0; pointer-events: none; }
    .onboarding-card {
      background: rgba(20, 26, 38, 0.9); backdrop-filter: blur(20px); border-radius: 36px;
      padding: 32px 24px; width: 90%; max-width: 360px; text-align: center;
      border: 1px solid rgba(0, 170, 255, 0.2); position: relative;
    }
    .onboarding-icon { font-size: 56px; color: #00aaff; margin-bottom: 20px; animation: floatIcon 3s infinite; }
    .onboarding-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 600; background: linear-gradient(135deg, #ffffff, #99ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; }
    .onboarding-text { font-size: 15px; color: #b0c7e0; line-height: 1.5; margin-bottom: 24px; }
    .onboarding-btn { background: linear-gradient(135deg, #0088ff, #0066cc); border: none; color: white; font-weight: 600; padding: 14px 36px; border-radius: 36px; font-size: 16px; cursor: pointer; }
    .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); display: inline-block; margin: 0 4px; }
    .progress-dot.active { background: #00aaff; box-shadow: 0 0 10px #00aaff; }
    .skip-btn { position: absolute; top: 10px; right: 14px; background: rgba(255,255,255,0.05); border: none; color: #aaa; font-size: 18px; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }

    @media (max-width: 380px) {
      .center-btn { width: 64px; height: 64px; }
      .center-btn i { font-size: 24px; }
      .screen { padding-bottom: 65px; }
      .screen.map-screen { padding-bottom: 0; }
    }
  </style>
</head>
<body>
<div class="bg-decoration">
  <div class="bg-circle c1"></div><div class="bg-circle c2"></div><div class="bg-circle c3"></div>
  <div class="floating-icons">
    <i class="fas fa-syringe float-icon"></i><i class="fas fa-tint float-icon"></i><i class="fas fa-cloud float-icon"></i>
    <i class="fas fa-syringe float-icon"></i><i class="fas fa-tint float-icon"></i><i class="fas fa-cloud float-icon"></i>
  </div>
</div>

<div class="onboarding-overlay" id="onboardingOverlay">
  <div class="onboarding-card" id="onboardingCard"></div>
</div>

<div class="app-container" id="appContainer">
  <div class="screen welcome-screen" id="welcomeScreen">
    <div class="morning-icon"><i class="fas fa-mug-hot"></i></div>
    <div class="welcome-title" id="welcomeTitle">Доброе утро</div>
    <div class="welcome-subtitle" id="welcomeUsername">Загрузка...</div>
  </div>

  <div class="screen profile-screen hidden" id="profileScreen">
    <div class="avatar-frame"><div class="avatar" id="avatarContainer"><i class="fas fa-cloud"></i></div></div>
    <div class="username" id="profileUsername">Vaper_Dimasta</div>
    <div class="user-level"><i class="fas fa-crown" style="color:#00aaff;"></i> Platinum Level</div>
    <div class="stats-row" id="profileStatsRow">
      <div class="stat-item"><span class="stat-value">247</span><span class="stat-label">заправок</span></div>
      <div class="stat-item"><span class="stat-value">18.5K</span><span class="stat-label">puffs</span></div>
    </div>
    <div class="balance-badge"><span class="balance-icon"><i class="fas fa-tint"></i></span><span class="balance-text">1 280 BYN</span></div>
    <div style="font-size:11px; color:#6b7c9e; margin-top:6px;">баланс жижи</div>
  </div>

  <div class="screen flavor-screen hidden" id="flavorScreen">
    <div class="flavor-header">
      <button class="back-btn" id="backFromFlavorBtn"><i class="fas fa-arrow-left"></i></button>
      <h2>Выбери жижу</h2>
    </div>
    <div class="flavor-list" id="flavorList"></div>
  </div>

  <div class="screen juice-screen hidden" id="juiceScreen">
    <h3 style="font-weight:600; z-index:1; margin-bottom:15px;">Заправка картриджа</h3>
    <p style="color:#a0b9d9;font-size:13px;margin:4px 0 6px; z-index:1;" id="currentFlavorLabel">Клубничный микс</p>
    <div class="juice-fill-container" style="z-index:1;">
      <div class="cartridge-body"><div class="liquid-fill" id="liquidFill"></div></div>
      <div class="cartridge-tip"></div>
    </div>
    <div style="z-index:1; margin:10px 0 4px;"><span class="flavor-dot" style="display:inline-block;width:10px;height:10px;background:#00aaff;border-radius:4px;"></span> <span id="currentFlavorName">Клубничный микс</span></div>
    <button class="refill-btn" id="refillButton" style="z-index:1;"><i class="fas fa-fill-drip"></i> Заправить</button>
    <div style="color:#7b8ca8; margin-top:8px; z-index:1;">спишется 45 BYN с баланса</div>
  </div>

  <div class="screen map-screen hidden" id="mapScreen">
    <div class="map-header">
      <span class="map-title"><i class="fas fa-map-pin"></i> Точки быстрой заливки</span>
      <button class="map-close" id="closeMapBtn"><i class="fas fa-times"></i></button>
    </div>
    <div id="map"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="profileNavBtn"><i class="fas fa-user-circle"></i><span>Профиль</span></button>
    <button class="center-btn" id="juiceNavBtn"><i class="fas fa-syringe"></i><span>Залить</span></button>
    <button class="nav-btn" id="mapNavBtn"><i class="fas fa-map-location-dot"></i><span>Точки</span></button>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  (function() {
    // ========== ГЛОБАЛЬНЫЕ ФУНКЦИИ НАВИГАЦИИ ==========
    window.hideAllScreens = function() {
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('profileScreen').classList.add('hidden');
      document.getElementById('flavorScreen').classList.add('hidden');
      document.getElementById('juiceScreen').classList.add('hidden');
      document.getElementById('mapScreen').classList.add('hidden');
    };

    window.setActiveNav = function(activeBtn) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (activeBtn) activeBtn.classList.add('active');
    };

    window.showWelcome = function() {
      window.hideAllScreens();
      document.getElementById('welcomeScreen').classList.remove('hidden');
      window.setActiveNav(null);
    };

    window.showProfile = function() {
      window.hideAllScreens();
      document.getElementById('profileScreen').classList.remove('hidden');
      window.setActiveNav(document.getElementById('profileNavBtn'));
      if (typeof window.updateStreak === 'function') window.updateStreak();
    };

    window.showFlavorSelection = function() {
      window.hideAllScreens();
      document.getElementById('flavorScreen').classList.remove('hidden');
      window.setActiveNav(null);
      if (typeof window.loadFlavors === 'function' && document.getElementById('flavorList').children.length === 0) {
        window.loadFlavors();
      }
    };

    window.showMap = function() {
      window.hideAllScreens();
      document.getElementById('mapScreen').classList.remove('hidden');
      window.setActiveNav(document.getElementById('mapNavBtn'));
      if (!window.mapInstance) {
        if (typeof window.initMap === 'function') window.initMap();
      } else {
        setTimeout(() => window.mapInstance.invalidateSize(), 200);
      }
    };

    // ========== ОБРАБОТЧИКИ КНОПОК ==========
    document.getElementById('profileNavBtn').onclick = window.showProfile;
    document.getElementById('mapNavBtn').onclick = window.showMap;
    document.getElementById('juiceNavBtn').onclick = window.showFlavorSelection;
    document.getElementById('closeMapBtn').onclick = window.showProfile;
    document.getElementById('backFromFlavorBtn').onclick = window.showProfile;

    // ========== ИНИЦИАЛИЗАЦИЯ TELEGRAM ==========
    let tgUser = null;
    try {
      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
        tgUser = window.Telegram.WebApp.initDataUnsafe.user;
      }
    } catch(e) {}
    const username = tgUser ? (tgUser.first_name || 'Vaper') : 'Vaper_Dimasta';
    document.getElementById('welcomeUsername').textContent = username;
    document.getElementById('profileUsername').textContent = username;
    const avatarContainer = document.getElementById('avatarContainer');
    if (tgUser && tgUser.photo_url) {
      avatarContainer.innerHTML = `<img src="${tgUser.photo_url}" alt="avatar">`;
    } else {
      avatarContainer.innerHTML = '<i class="fas fa-cloud"></i>';
    }

    // ========== ПРИВЕТСТВИЕ ПО ВРЕМЕНИ СУТОК ==========
    function updateWelcomeByTime() {
      const hour = new Date().getHours();
      let greeting;
      if (hour >= 6 && hour < 12) greeting = 'Доброе утро';
      else if (hour >= 12 && hour < 18) greeting = 'Добрый день';
      else if (hour >= 18 && hour < 24) greeting = 'Добрый вечер';
      else greeting = 'Доброй ночи';
      document.getElementById('welcomeTitle').textContent = greeting;
    }
    updateWelcomeByTime();

    // ========== ОНБОРДИНГ ==========
    const messages = [
      { icon: 'fa-cloud', title: 'Добро пожаловать', text: 'В заливака шоп можно залить разную жижУ, с разными вкусами, быстро и дёшево.' },
      { icon: 'fa-shield-haltered', title: 'Ответственность', text: 'Мы несём ответственность за ваши подики при заливке у наших заливашек. Если наш сотрудник украдёт или обманет и заберет у вас подик, мы выпишем полную компенсацию с моральной компенсацией и заблокируем недоброжелательного сотрудника.' },
      { icon: 'fa-syringe', title: 'Как происходит заливка', text: 'Вы даете деньги, карик вам заливают и отдают ваш карик.' }
    ];
    const overlay = document.getElementById('onboardingOverlay');
    const card = document.getElementById('onboardingCard');
    let step = 0;

    function renderStep() {
      const m = messages[step];
      card.innerHTML = `
        <button class="skip-btn" id="skipBtn"><i class="fas fa-times"></i></button>
        <div class="onboarding-icon"><i class="fas ${m.icon}"></i></div>
        <div class="onboarding-title">${m.title}</div>
        <div class="onboarding-text">${m.text}</div>
        <button class="onboarding-btn" id="nextBtn">Понятно <i class="fas fa-arrow-right"></i></button>
        <div style="margin-top:20px;">${messages.map((_,i)=>`<span class="progress-dot ${i===step?'active':''}"></span>`).join('')}</div>
      `;
      document.getElementById('nextBtn').onclick = () => {
        if (step < messages.length-1) { step++; renderStep(); }
        else finishOnboarding();
      };
      document.getElementById('skipBtn').onclick = finishOnboarding;
    }

    function finishOnboarding() {
      localStorage.setItem('onboarding_done', 'true');
      overlay.classList.add('hidden');
      window.showWelcome();
    }

    if (!localStorage.getItem('onboarding_done')) {
      renderStep();
    } else {
      overlay.classList.add('hidden');
      window.showWelcome();
    }

    // ========== СЧЁТЧИК ДНЕЙ АКТИВНОСТИ ==========
    window.updateStreak = function() {
      const today = new Date().toISOString().split('T')[0];
      let last = localStorage.getItem('lastActiveDate');
      let streak = parseInt(localStorage.getItem('streakCount')||'0');
      if (!last || last !== today) {
        const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
        streak = (last === yesterday) ? streak+1 : 1;
        localStorage.setItem('lastActiveDate', today);
        localStorage.setItem('streakCount', streak);
      }
      const row = document.getElementById('profileStatsRow');
      let el = document.getElementById('streakStatItem');
      if (!el) {
        el = document.createElement('div'); el.className = 'stat-item'; el.id = 'streakStatItem';
        row.appendChild(el);
      }
      el.innerHTML = `<span class="stat-value">${streak}🔥</span><span class="stat-label">дней подряд</span>`;
    };

    // ========== ПАРСИНГ ЖИДКОСТЕЙ ==========
    window.loadFlavors = async function() {
      const container = document.getElementById('flavorList');
      try {
        const res = await fetch('https://raw.githubusercontent.com/ZALIVAKA11/ZALIVAKA/refs/heads/main/ZIZAN');
        const text = await res.text();
        const lines = text.split('\n').filter(l => l.trim() !== '');
        const flavors = [];
        lines.forEach(line => {
          const parts = line.split(/\s*-\s*/);
          if (parts.length >= 3) {
            flavors.push({ name: parts[1].trim(), prefix: parts.slice(2).join(' - ').trim() });
          } else if (parts.length === 2) {
            flavors.push({ name: parts[1].trim(), prefix: '' });
          }
        });
        if (flavors.length === 0) {
          container.innerHTML = '<div style="color:#7b8ca8; text-align:center; padding:40px;">Список жидкостей пуст</div>';
          return;
        }
        container.innerHTML = flavors.map(f => `
          <div class="flavor-item" data-name="${f.name}" data-prefix="${f.prefix}">
            <div class="flavor-icon"><i class="fas fa-tint"></i></div>
            <div class="flavor-info"><div class="flavor-name">${f.name}</div><div class="flavor-prefix">${f.prefix}</div></div>
          </div>`).join('');
        container.querySelectorAll('.flavor-item').forEach(el => {
          el.onclick = () => {
            document.getElementById('currentFlavorLabel').textContent = el.dataset.name;
            document.getElementById('currentFlavorName').textContent = el.dataset.name + (el.dataset.prefix ? ` ${el.dataset.prefix}` : '');
            window.hideAllScreens();
            document.getElementById('juiceScreen').classList.remove('hidden');
            document.getElementById('liquidFill').style.height = '0%';
            document.getElementById('refillButton').disabled = false;
            document.getElementById('refillButton').innerHTML = '<i class="fas fa-fill-drip"></i> Заправить';
          };
        });
      } catch (e) {
        container.innerHTML = '<div style="color:#7b8ca8; text-align:center; padding:40px;">Не удалось загрузить список</div>';
      }
    };
    window.loadFlavors();

    // ========== ЗАПРАВКА ==========
    document.getElementById('refillButton').onclick = function() {
      if (this.disabled) return;
      const fill = document.getElementById('liquidFill');
      fill.style.height = '92%';
      this.disabled = true;
      this.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Заправка...';
      setTimeout(() => {
        this.innerHTML = '<i class="fas fa-check-circle"></i> Заправлено';
        const bal = document.querySelector('.balance-text');
        if (bal) bal.textContent = Math.max(0, parseInt(bal.textContent) - 45).toLocaleString() + ' BYN';
        setTimeout(() => {
          if (!document.getElementById('juiceScreen').classList.contains('hidden')) {
            this.disabled = false;
            this.innerHTML = '<i class="fas fa-fill-drip"></i> Заправить';
            fill.style.height = '0%';
          }
        }, 1500);
      }, 1400);
    };

    // ========== КАРТА (ИНТЕРАКТИВНАЯ) ==========
    window.initMap = function() {
      const el = document.getElementById('map');
      if (!el || el.offsetWidth === 0 || el.offsetHeight === 0) {
        setTimeout(window.initMap, 200);
        return;
      }
      if (window.mapInstance) {
        window.mapInstance.invalidateSize();
        return;
      }
      window.mapInstance = L.map('map', {
        center: [53.15, 29.20],
        zoom: 13,
        zoomControl: true,           // показывать кнопки зума
        dragging: true,              // разрешить перетаскивание
        scrollWheelZoom: true,       // зум колёсиком (на десктопе)
        doubleClickZoom: true,
        touchZoom: true,             // зум жестами на мобильных
        attributionControl: false
      });
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '',
        maxZoom: 19
      }).addTo(window.mapInstance);

      const points = [
        { coords: [53.141822, 29.160164], name: 'Киселевичи', time: '10:00 – 03:00', desc: 'Бесплатная доставка в радиусе 1 км, дальше по тарифу.' },
        { coords: [53.163148, 29.176973], name: 'Западный', time: '12:00 – 23:00', desc: 'Бесплатная доставка в радиусе 1 км, дальше по тарифу. После закрытия — переплата.' },
        { coords: [53.154420, 29.160507], name: 'Черепки', time: '12:00 – 23:00', desc: 'Бесплатная доставка в радиусе 1 км, дальше по тарифу. После закрытия — переплата.' },
        { coords: [53.139830, 29.195309], name: 'ЖД вокзал', time: '15:00 – 21:00', desc: 'Бесплатная доставка в радиусе 1 км, дальше по тарифу. После закрытия — переплата.' },
        { coords: [53.133610, 29.227515], name: 'Держинка', time: '15:00 – 21:00', desc: 'Бесплатная доставка в радиусе 1 км, дальше по тарифу. После закрытия — переплата.' }
      ];
      points.forEach(p => {
        const icon = L.divIcon({
          html: `<i class="fas fa-map-pin" style="font-size: 26px; color: #00aaff; filter: drop-shadow(0 0 8px #00aaff);"></i>`,
          className: 'custom-marker',
          iconSize: [26, 26],
          iconAnchor: [13, 26]
        });
        L.marker(p.coords, { icon }).addTo(window.mapInstance)
          .bindPopup(`<div style="font-family:Inter,sans-serif; color:#111; padding:4px;"><b>${p.name}</b><br>🕒 ${p.time}<br>${p.desc}</div>`);
      });
      setTimeout(() => window.mapInstance.invalidateSize(), 100);
    };
  })();
</script>
</body>
</html>
